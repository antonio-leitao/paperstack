  url = "https://www.semanticscholar.org/paper/183dc294bec7523509b40f3594152a58b6cd3ef3"
  title = "Application of hidden Markov modeling to the characterization of transcription factor binding sites"
  abstract = 'The regulation of gene transcription in eukaryotes, though not well understood, is known to involve sequence specific recognition and binding of short DNA sequences (transcription elements) by regulatory proteins (transcription factors). The cis acting transcription elements can be found at a considerable distance upstream or downstream from the gene they control and are often orientation independent. The transcriptional state of a gene is thought to require the formation of a "transcription complex" where multiple elements and factors interact through DNA-protein and protein-protein binding events. As a step towards elucidating the process of transcription complex formation, the authors have developed a model of transcription factor-DNA binding based on Hidden Markov Models (HMM). The parameters of the HMM are probabilities from which an entropy measure can be calculated that characterizes the information requirements of the binding process. Alignment of the set of transcription elements against the HMM also yields information regarding the conserved positions recognized by the transcription factor. Finally, they examine the relationship between the entropy of the model and the accuracy of the model when used for pattern recognition: in general, pattern recognition efficient when the conservation of bases in the sites is fairly high.<<ETX>>'
  year = 1_994
  citationCount = 11

